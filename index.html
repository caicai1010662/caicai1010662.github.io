            color: white;

        }
        @keyframes wave {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

                0 0 20px #00ff00,
                0 0 30px #00ff00,
                0 0 40px #0000ff,
                0 0 50px #0000ff,
                0 0 60px #ffffff;
        }
    </style>
</head>
